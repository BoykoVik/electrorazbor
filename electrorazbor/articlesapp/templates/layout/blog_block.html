{% load thumbnail %}
{% if articles.count > 1 %}
<div class="main-blog-area pb-100px">
    <div class="container">

        <div class="row">
            <div class="col-md-12">
                <div class="section-title text-center mb-30px0px">
                    <h2 class="title">Последние записи</h2>
                    <p>Всё о мире электротранспорта</p>
                </div>
            </div>
        </div>

        <div class="row">
            {% for article in articles %}
            <div class="col-lg-6 col-sm-6 mb-xs-30px">
                <div class="single-blog">
                    <div class="blog-image">
                        <a href="{{ article.get_absolute_url }}">
                            <img src="{{ article.image|thumbnail_url:'card' }}" class="img-responsive w-100" alt="{{ article.title }}">
                        </a>
                    </div>
                    <div class="blog-text">
                        <div class="blog-athor-date line-height-1">
                            <span class="blog-date"><i class="fa fa-calendar" aria-hidden="true"></i>{{ article.date }}</span>
                        </div>
                        <h5 class="blog-heading">
                            <a class="blog-heading-link" href="{{ article.get_absolute_url }}">{{ article.title }}</a>
                        </h5>
                        <p>{{ article.about|truncatechars:70 }}</p>
                        <a href="{{ article.get_absolute_url }}" class="btn btn-primary blog-btn">Подробнее</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endif %}
